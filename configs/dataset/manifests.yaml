# Dataset settings for Label Studio-derived manifests.

name: labelstudio_manifests
train_manifest: ${paths.manifests_dir}/train.jsonl
val_manifest: ${paths.manifests_dir}/val.jsonl
test_manifest: ${paths.manifests_dir}/test.jsonl
labels_path: ${paths.manifests_dir}/labels.json

loader:
  video_backend: pyav          # alt: decord, torchvision
  num_workers: 8
  pin_memory: true
  prefetch_factor: 2
  persistent_workers: true
  drop_last: false

sampling:
  num_frames: 16
  frame_size: 224
  fps: null                     # infer from source; override if needed
  clip_seconds: 2.5
  strategy: uniform             # options: uniform, random, center
  temporal_jitter: 4            # +/- frames for augmentation

augmentation:
  random_horizontal_flip: true
  color_jitter:
    enabled: true
    brightness: 0.2
    contrast: 0.2
    saturation: 0.2
    hue: 0.05
  normalize:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]
