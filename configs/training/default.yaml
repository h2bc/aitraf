# Default optimization/training hyperparameters.

batch_size:
  train: 8
  eval: 8

max_epochs: 30
max_steps: null
gradient_accumulation: 1
precision: bf16           # choices: fp32, fp16, bf16
gradient_clip_norm: 1.0

optimizer:
  name: adamw
  lr: 5.0e-5
  betas: [0.9, 0.999]
  weight_decay: 0.05
  eps: 1.0e-8

scheduler:
  name: cosine_with_warmup
  warmup_steps: 1500
  min_lr_ratio: 0.1

evaluation:
  interval_epochs: 1
  metrics: [accuracy, macro_f1]
  save_best_metric: macro_f1

checkpointing:
  save_interval_epochs: 1
  keep_last: 3
  monitor: macro_f1
  mode: max

compile:
  enabled: false
  mode: default
