defaults:
  - base
  - _self_

download_labels:
  enabled: true
  force: false
  prefix: labels
  output_path: ${paths.labels_path}

download_clips:
  enabled: true
  force: false
  labels_path: ${download_labels.output_path}
  output_dir: ${paths.clips_dir}

download_pairwise_labels:
  enabled: false
  force: false
  prefix: ranks
  output_dir: ${paths.storage_data_dir}/pairwise_labels
  output_path: ${paths.pairwise_labels_path}

pose_and_bbox_extraction:
  enabled: false
  force: false
  limit: null
  clips_dir: ${download_clips.output_dir}
  poses_dir: ${paths.poses_dir}
  boxes_dir: ${paths.boxes_dir}
  weights_path: ${paths.models_dir}/yolo11n-pose.pt
  device: cuda
  imgsz: 640
  conf: 0.5
  batch_size: 128
  max_det: 1

video_mae_feature_extraction:
  enabled: false
  force: false
  limit: null
  clips_dir: ${download_clips.output_dir}
  features_dir: ${paths.video_mae_features_dir}
  backbone: ${oc.env:AITRAF_VIDEO_FEATURE_BACKBONE,MCG-NJU/videomae-base-finetuned-kinetics}
  model_cache_dir: ${paths.models_dir}
  device: cuda
  batch_size: 1
  num_workers: 4
  num_clips: 6
  sample_frames: 16
  sampling_dist: uniform
