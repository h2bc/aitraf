[project]
name = "aitraf"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "torch",
    "torchvision",
    "torchaudio",
    "torchcodec",
    "ultralytics",
    "python-dotenv",
    "ipykernel",
    "label-studio-sdk",
    "datasets",
    "ipywidgets",
    "s3fs>=2025",
    "av",
    "imageio[ffmpeg]",
    "boto3",
]

[dependency-groups]
dev = ["ruff", "pytest"]
