[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aitraf"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "torch",
    "torchvision",
    "torchaudio",
    "torchcodec",
    "ultralytics",
    "python-dotenv",
    "pandas",
    "scikit-learn",
    "label-studio-sdk",
    "datasets",
    "s3fs>=2025",
    "av",
    "imageio[ffmpeg]",
    "boto3",
]

[dependency-groups]
dev = [
    "ruff", 
    "pytest", 
    "ipykernel", 
    "ipywidgets"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
