[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aitraf"
version = "0.1.0"
requires-python = ">=3.9,<3.14"
dependencies = [
    "python-dotenv",
    "loguru",
    "transformers",
    "huggingface-hub>=0.34,<1.0",
    "hydra-core",
    "pandas",
    "scikit-learn",
    "label-studio-sdk",
    "datasets",
    "av",
    "boto3",
    "numpy"
]

[dependency-groups]
dev = [
    "ruff", 
    "pytest", 
    "ipykernel", 
    "ipywidgets"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
