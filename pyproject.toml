[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aitraf"
version = "0.1.0"
requires-python = ">=3.10,<=3.13"
dependencies = [
    "python-dotenv",
    "loguru",
    "transformers",
    "datasets",
    "accelerate>=0.26.0",
    "ffmpeg-python",
    "huggingface-hub>=0.34,<1.0",
    "hydra-core",
    "pandas",
    "scikit-learn",
    "label-studio-sdk",
    "av",
    "boto3",
    "numpy",
    "ultralytics"
]

[dependency-groups]
dev = [
    "ruff", 
    "pytest", 
    "ipykernel", 
    "ipywidgets"
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
