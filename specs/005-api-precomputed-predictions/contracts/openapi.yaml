openapi: 3.1.0
info:
  title: AITRAF Demo API
  version: 0.1.0
  description: Demo API serving matched precomputed demo predictions.
paths:
  /health:
    get:
      summary: Health check
      operationId: getHealth
      responses:
        "200":
          description: API process is running.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /demo-predictions:
    get:
      summary: List demo predictions
      operationId: listDemoPredictions
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Demo prediction records built from matching prediction rows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DemoPrediction"
        "401":
          description: Missing or invalid API token.
        "503":
          description: Prediction artifacts are missing, unreadable, or incomplete.
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    HealthResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          enum:
            - ok
    DemoPrediction:
      type: object
      required:
        - video_id
        - video_url
        - person
        - ground_truth
        - predictions
      properties:
        video_id:
          type: string
        video_url:
          type: string
          format: uri
        person:
          type: string
        ground_truth:
          $ref: "#/components/schemas/GroundTruth"
        predictions:
          $ref: "#/components/schemas/TaskPredictions"
    GroundTruth:
      type: object
      required:
        - trick
        - execution_score
      properties:
        trick:
          type: string
        execution_score:
          type: string
    TaskPredictions:
      type: object
      required:
        - trick_classification
        - trick_aqa
      properties:
        trick_classification:
          $ref: "#/components/schemas/TaskPrediction"
        trick_aqa:
          $ref: "#/components/schemas/TaskPrediction"
    TaskPrediction:
      type: object
      required:
        - label
        - confidence
      properties:
        label:
          type: string
        confidence:
          type: number
          minimum: 0.0
          maximum: 1.0
