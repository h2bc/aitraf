openapi: 3.1.0
info:
  title: AITRAF Demo Inference API - Temporal Fusion Trick AQA
  version: 0.2.0
  description: Contract delta for serving trick AQA with a temporal-fusion model.
servers:
  - url: http://localhost:8000
security:
  - bearerAuth: []
paths:
  /inference/trick-aqa/{id}:
    post:
      summary: Run temporal-fusion trick AQA inference for a selected demo video
      parameters:
        - $ref: "#/components/parameters/InferenceId"
        - name: cache_frames
          in: query
          required: false
          description: Enables sampled-frame cache reuse when true. Defaults come from service configuration.
          schema:
            type: boolean
        - name: cache_video_features
          in: query
          required: false
          description: Enables VideoMAE feature cache reuse when true. Defaults come from service configuration.
          schema:
            type: boolean
      responses:
        "200":
          description: Temporal-fusion trick AQA prediction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TemporalFusionInferenceResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/InvalidSelection"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    InferenceId:
      name: id
      in: path
      required: true
      description: Stable video id returned by GET /demo-videos and resolvable in the current trick AQA manifest.
      schema:
        type: string
  responses:
    Unauthorized:
      description: Missing or invalid app token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Requested video id does not exist for trick AQA
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InvalidSelection:
      description: Request id is malformed or cannot be resolved by the trick AQA endpoint
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ServiceUnavailable:
      description: Required manifest, video, runtime config, cached feature, processor, decoder metadata, or temporal-fusion model artifact is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    TemporalFusionInferenceResult:
      type: object
      required: [video_id, prediction, ground_truth, model]
      properties:
        video_id:
          type: string
        prediction:
          $ref: "#/components/schemas/PredictionResult"
        ground_truth:
          $ref: "#/components/schemas/DisplayResult"
        model:
          $ref: "#/components/schemas/TemporalFusionModelInfo"
    PredictionResult:
      type: object
      required: [label, confidence]
      properties:
        label:
          type: string
          description: User-facing trick AQA assessment label or value decoded from temporal-fusion output.
        confidence:
          type: number
          minimum: 0
          maximum: 1
          description: Model confidence normalized from 0 to 1.
    DisplayResult:
      type: object
      required: [label]
      properties:
        label:
          type: string
          description: User-facing ground-truth trick AQA assessment label or value.
    TemporalFusionModelInfo:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [fusion, temporal_fusion, video_mae_temporal_fusion]
          description: Compact demo-facing model identity for temporal fusion.
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
