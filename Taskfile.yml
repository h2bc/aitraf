version: "3"

includes:
  core:
    taskfile: packages/aitraf-core/Taskfile.yml
    dir: .
  ml-core:
    taskfile: packages/aitraf-ml-core/Taskfile.yml
    dir: .
  train:
    taskfile: packages/aitraf-train/Taskfile.yml
    dir: .
  api:
    taskfile: packages/aitraf-api/Taskfile.yml
    dir: .

tasks:

  install:
    desc: Install workspace dependencies
    cmds:
      - uv sync

  test:
    desc: Run every package's tests
    cmds:
      - task: core:test
      - task: ml-core:test
      - task: train:test
      - task: api:test

  lint:
    desc: Run ruff linting
    cmds:
      - uv run ruff check . {{.CLI_ARGS}}

  format:
    desc: Run ruff formatting 
    cmds: 
      - uv run ruff format . {{.CLI_ARGS}}

  docker:build:
    desc: Build local aitraf-api and aitraf-train Docker images
    cmds:
      - docker build -f packages/aitraf-api/Dockerfile -t aitraf-api:local . {{.CLI_ARGS}}
      - docker build -f packages/aitraf-train/Dockerfile -t aitraf-train:local . {{.CLI_ARGS}}
