[build-system]
requires = ["setuptools>=69", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "aitraf-api"
version = "0.1.0"
requires-python = ">=3.10,<3.14"
dependencies = [
    "aitraf-core",
    "fastapi",
    "mlflow",
    "pydantic",
    "python-dotenv",
    "redis>=5",
    "uvicorn[standard]",
]

[project.optional-dependencies]
dev = [
    "httpx",
    "pytest",
]

[tool.pytest.ini_options]
markers = [
    "redis_integration: tests requiring a reachable Redis service",
]

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
