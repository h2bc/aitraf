version: "3"

tasks:
  run:
    desc: Run the local API and Redis Compose stack
    dir: "{{.TASKFILE_DIR}}/../.."
    cmds:
      - docker compose up --build {{.CLI_ARGS}}

  test:
    desc: Run API tests
    dir: "{{.TASKFILE_DIR}}/../.."
    cmds:
      - "uv run --package aitraf-api --extra dev pytest packages/aitraf-api/tests {{.CLI_ARGS}}"

  lint:
    desc: Run API lint checks
    dir: "{{.TASKFILE_DIR}}/../.."
    cmds:
      - "uv run ruff check packages/aitraf-api/src/aitraf_api packages/aitraf-api/tests {{.CLI_ARGS}}"

  docker:build:
    desc: Build the local aitraf-api Docker image
    dir: "{{.TASKFILE_DIR}}/../.."
    cmds:
      - "docker build -f packages/aitraf-api/Dockerfile -t {{.IMAGE | default \"aitraf-api:local\"}} . {{.CLI_ARGS}}"
